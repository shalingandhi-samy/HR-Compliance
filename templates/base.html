<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PHL5 CBL Compliance{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            walmart: { blue: '#0053e2', yellow: '#ffc220', dark: '#041f41' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .status-overdue   { background-color: #fef2f2; color: #ea1100; border-color: #ea1100; }
    .status-7days     { background-color: #fffbeb; color: #995213; border-color: #ffc220; }
    .status-14days    { background-color: #fffbeb; color: #995213; border-color: #f59e0b; }
    .status-30days    { background-color: #eff6ff; color: #0053e2; border-color: #0053e2; }
    .status-60days    { background-color: #f0fdf4; color: #2a8703; border-color: #2a8703; }
    .badge { display:inline-flex; align-items:center; padding:2px 10px; border-radius:9999px; font-size:0.75rem; font-weight:600; border:1px solid; }
    .sortable-table thead th { cursor: pointer; user-select: none; white-space: nowrap; }
    .sortable-table thead th:hover { opacity: 0.82; }
    .sortable-table thead th.sort-asc::after  { content: ' ↑'; font-size: 0.7rem; }
    .sortable-table thead th.sort-desc::after { content: ' ↓'; font-size: 0.7rem; }
    @media print {
      nav, .tab-nav, footer, .no-print { display: none !important; }
      body { background: white !important; }
      .shadow, .shadow-lg, .shadow-md { box-shadow: none !important; }
      a { text-decoration: none !important; color: inherit !important; }
    }
    /* Dark mode */
    .dark body        { background-color: #0f172a !important; color: #e2e8f0 !important; }
    .dark nav         { background-color: #020617 !important; }
    .dark .tab-nav    { background-color: #0f172a !important; border-color: #1e293b !important; }
    .dark main        { background-color: #0f172a !important; }
    .dark footer      { color: #475569 !important; }
    .dark .bg-white   { background-color: #1e293b !important; }
    .dark .bg-gray-50 { background-color: #0f172a !important; }
    .dark .bg-gray-100{ background-color: #1e293b !important; }
    .dark .border-gray-100 { border-color: #334155 !important; }
    .dark .text-gray-500   { color: #94a3b8 !important; }
    .dark .text-gray-400   { color: #64748b !important; }
    .dark .text-gray-700   { color: #cbd5e1 !important; }
    .dark .text-gray-800   { color: #e2e8f0 !important; }
    .dark .text-\[\#041f41\] { color: #93c5fd !important; }
    .dark .divide-gray-100 > * { border-color: #334155 !important; }
    .dark .hover\:bg-blue-50:hover  { background-color: #1e3a5f !important; }
    .dark .hover\:bg-gray-50:hover  { background-color: #1e293b !important; }
    .dark .hover\:bg-yellow-50:hover{ background-color: #2d1f00 !important; }
    .dark .hover\:bg-red-50:hover   { background-color: #2d0a0a !important; }
    .dark .hover\:bg-green-50:hover { background-color: #052e0a !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-[#0053e2] shadow-md no-print">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/" class="text-white/80 hover:text-white text-xl transition">&#127968;</a>
      </div>
      <span class="fixed top-3 left-4 z-50 text-white font-bold text-lg tracking-wide no-print">PHL5 COMPLIANCE DASHBOARD</span>
    </div>
  </nav>

  <!-- Fixed top-right: last refreshed + dark mode toggle -->
  <div class="no-print fixed top-3 right-4 z-50 flex items-center gap-3">
    <span class="text-white/80 text-xs"
      hx-get="/api/last-refreshed"
      hx-trigger="load, every 60s"
      hx-swap="innerHTML">
      &#128260; Loading...
    </span>
    <button id="dark-toggle" onclick="toggleDark()"
      class="text-2xl leading-none hover:scale-110 transition-transform"
      title="Toggle dark mode">🌙</button>
  </div>

  <div class="tab-nav bg-[#041f41] border-b border-white/10 overflow-x-auto">
    <div class="flex gap-1 whitespace-nowrap justify-center">
      <a href="/cbls" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if request.url.path == '/cbls' or '/cbls/manager/' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#128218; CBL Compliance
      </a>
      <a href="/attendance" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if '/attendance' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#128197; Attendance Exceptions
      </a>
      <a href="/checkins" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if '/checkins' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#9989; Manager Check Ins
      </a>
      <a href="/points" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if '/points' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#9888;&#65039; Attendance Points 5+
      </a>
      <a href="/pto" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if '/pto' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#128203; Time Off Requests
      </a>
      <a href="/scorecard" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if '/scorecard' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#127942; Manager Scorecard
      </a>
      <a href="/lookup" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if '/lookup' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#128269; Associate Lookup
      </a>
      <a href="/shifts" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if '/shifts' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#128197; Shift Breakdown
      </a>
      <a href="/trends" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if '/trends' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#128202; Trends
      </a>
      <a href="/leaderboard" class="px-4 py-3 text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition rounded-t-md
        {% if '/leaderboard' in request.url.path %}bg-white/10 text-white border-b-2 border-[#ffc220]{% endif %}">
        &#127942; Leaderboard
      </a>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-gray-400 text-xs py-6 mt-8">
    PHL5 Compliance &mdash; Internal Use Only
  </footer>

<script>
// Dark mode
function toggleDark() {
  var html = document.getElementById('html-root');
  var isDark = html.classList.toggle('dark');
  localStorage.setItem('darkMode', isDark ? '1' : '0');
  document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
}
(function () {
  if (localStorage.getItem('darkMode') === '1') {
    document.getElementById('html-root').classList.add('dark');
    document.addEventListener('DOMContentLoaded', function () {
      var btn = document.getElementById('dark-toggle');
      if (btn) btn.textContent = '☀️';
    });
  }
})();
</script>

<script>
function exportTableToCSV(tableId, filename) {
  var table = document.getElementById(tableId);
  if (!table) return;
  var rows = [];
  var headers = Array.from(table.querySelectorAll('thead th')).map(function (th) {
    return '"' + th.textContent.trim().replace(/[\u2191\u2193]/g, '').trim().replace(/"/g, '""') + '"';
  });
  rows.push(headers.join(','));
  table.querySelectorAll('tbody tr').forEach(function (row) {
    if (row.style.display === 'none') return;
    var cells = Array.from(row.querySelectorAll('td')).map(function (td) {
      return '"' + td.textContent.trim().replace(/"/g, '""') + '"';
    });
    rows.push(cells.join(','));
  });
  var blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('table.sortable-table').forEach(function (table) {
    var headers = Array.from(table.querySelectorAll('thead th'));
    headers.forEach(function (th, colIdx) {
      th.addEventListener('click', function () {
        var tbody = table.querySelector('tbody');
        var rows = Array.from(tbody.querySelectorAll('tr'));
        var asc = th.dataset.sortDir !== 'asc';

        // Reset all headers
        headers.forEach(function (h) {
          h.classList.remove('sort-asc', 'sort-desc');
          delete h.dataset.sortDir;
        });
        th.dataset.sortDir = asc ? 'asc' : 'desc';
        th.classList.add(asc ? 'sort-asc' : 'sort-desc');

        rows.sort(function (a, b) {
          var aCells = a.querySelectorAll('td');
          var bCells = b.querySelectorAll('td');
          var aText = (aCells[colIdx] ? aCells[colIdx].textContent.trim() : '');
          var bText = (bCells[colIdx] ? bCells[colIdx].textContent.trim() : '');
          var aNum = parseFloat(aText.replace(/[^0-9.-]/g, ''));
          var bNum = parseFloat(bText.replace(/[^0-9.-]/g, ''));
          if (!isNaN(aNum) && !isNaN(bNum)) {
            return asc ? aNum - bNum : bNum - aNum;
          }
          return asc ? aText.localeCompare(bText) : bText.localeCompare(aText);
        });

        rows.forEach(function (row) { tbody.appendChild(row); });
      });
    });
  });
});
</script>
</body>
</html>
